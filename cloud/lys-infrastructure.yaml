AWSTemplateFormatVersion: '2010-09-09'
Description: 'LYS Platform Infrastructure: VPC, EC2, and RDS for University Project'

Parameters:
  DBUser:
    Type: String
    Default: 'lys_admin'
    Description: 'Username for RDS Instance'
  DBPassword:
    Type: String
    NoEcho: true
    Default: 'lys_p@ssword123'
    Description: 'Password for RDS Instance'

Resources:
  # --- VPC & Networking ---
  LYSVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: LYS-VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LYSVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: LYS-Public-Subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LYSVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Sub "${AWS::Region}b"
      Tags:
        - Key: Name
          Value: LYS-Private-Subnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LYSVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LYSVPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- Security Groups ---
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      VpcId: !Ref LYSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable database access from Web SG
      VpcId: !Ref LYSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref WebSecurityGroup

  # --- Database (RDS) ---
  LYSDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for LYS RDS Instance
      SubnetIds:
        - !Ref PublicSubnet # AWS RDS requires at least 2 subnets in different AZs normally
        - !Ref PrivateSubnet

  LYSRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: lys_db
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref LYSDBSubnetGroup
      PubliclyAccessible: false

  # --- Storage (S3) ---
  LYSImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "lys-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  LYSImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LYSImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${LYSImagesBucket.Arn}/*"

  # --- Security (IAM) ---
  LYSEC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${LYSImagesBucket.Arn}/*"

  LYSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LYSEC2Role

  # --- Monitoring (CloudWatch - Advanced Service 2) ---
  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm if CPU exceeds 70% for 5 minutes"
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref LYSEC2Instance

  LYSDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: "LYS-Monitoring-Dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization", "InstanceId", "${LYSEC2Instance}" ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "EC2 CPU Utilization"
              }
            }
          ]
        }

  # --- Compute (EC2) ---
  LYSEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      IamInstanceProfile: !Ref LYSInstanceProfile
      ImageId: "resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id"
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: LYS-App-Server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          # 1. System Updates & Dependencies
          apt-get update -y
          apt-get install -y git nodejs npm nginx postgresql-client
          
          # 2. Setup Nginx Reverse Proxy (Improved)
          cat > /etc/nginx/sites-available/default <<'EOF'
          server {
              listen 80;
              location /api {
                  proxy_pass http://localhost:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
              location / {
                  root /var/www/html;
                  index index.html;
              }
          }
          EOF
          # Ensure the symlink exists and force it
          ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
          systemctl restart nginx
          
          # 3. Clone and Setup LYS Application
          mkdir -p /home/ubuntu
          cd /home/ubuntu
          git clone https://github.com/abhinandnm/LYS.git
          cd LYS/server
          npm install
          
          # 4. Create Environment File
          cat > .env <<EOF
          DB_HOST=${LYSRDSInstance.Endpoint.Address}
          DB_USER=${DBUser}
          DB_PASSWORD=${DBPassword}
          DB_NAME=lys_db
          DB_PORT=5432
          S3_BUCKET_NAME=lys-images-${AWS::AccountId}
          AWS_REGION=${AWS::Region}
          PORT=3001
          EOF
          
          # 5. Initialize Database Table
          export PGPASSWORD='${DBPassword}'
          # Wait for RDS to be fully reachable (handshake time)
          sleep 30
          psql -h ${LYSRDSInstance.Endpoint.Address} -U ${DBUser} -d lys_db -c "
          CREATE TABLE IF NOT EXISTS services (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              category VARCHAR(100),
              price DECIMAL(10, 2),
              location VARCHAR(255),
              provider VARCHAR(255),
              image_url TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"
          
          # 6. Start the Backend
          nohup npm start > /home/ubuntu/lys_app.log 2>&1 &

Outputs:
  AppServerIP:
    Description: Public IP of the LYS App Server
    Value: !GetAtt LYSEC2Instance.PublicIp
  RDSEndpoint:
    Description: Endpoint of the LYS Database
    Value: !GetAtt LYSRDSInstance.Endpoint.Address
  S3BucketName:
    Description: Name of the LYS Images Bucket
    Value: !Ref LYSImagesBucket
  CloudWatchDashboard:
    Description: Visit CloudWatch to see your Monitoring Dashboard
    Value: "LYS-Monitoring-Dashboard"
