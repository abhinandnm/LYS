# Nginx Configuration for LYS Platform
# Location: /etc/nginx/conf.d/lys.conf

server {
    listen 80;
    server_name _; # Accept any IP address or domain

    root /home/ec2-user/LYS/dist; # Point to built React files
    index index.html;

    # 🌍 Frontend: Static built files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔗 Backend: Proxy to Express.js (Port 3001)
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 🖼️ Security & Logging
    error_log /var/log/nginx/lys_error.log;
    access_log /var/log/nginx/lys_access.log;
}
